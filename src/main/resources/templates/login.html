<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <main class="auth">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-badge">FreshCart</div>
                <h1>Welcome back</h1>
                <p>Sign in to manage your cart and discover fresh deals.</p>
            </div>

            <div class="message error" th:if="${param.error}">
                Invalid Username or Password.
            </div>

            <div class="message success" th:if="${param.Logout}">
                Logout Successfully.
            </div>

            <form class="auth-form" th:action="@{/login}" method="post">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required placeholder="you@example.com">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">

                <button type="submit">Login</button>

                <p class="auth-footer">
                    Don't have an account?
                    <a class="linkControl" href="./register.html" th:href="@{/registration}">Register here</a>
                </p>
            </form>
        </div>
    </main>
    
</body>
</html>
