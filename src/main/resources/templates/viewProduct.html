<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="/webjars/font-awesome/5.15.4/css/all.min.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <title>Document</title>
    <style>
        :root {
            --brand: #16a34a;
            --brand-dark: #0f8a3d;
            --ink: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --line: #e5e7eb;
        }
        body {
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 10%, rgba(22, 163, 74, 0.18), transparent 42%),
                radial-gradient(circle at 86% 12%, rgba(59, 130, 246, 0.14), transparent 38%),
                #f4f6fb;
            color: var(--ink);
        }
        .navbar {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }
        .brand {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--ink);
            margin-right: 10px;
        }
        .nav-pills a.nav-link {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 16px;
            margin-left: 8px;
            color: var(--ink);
            font-weight: 600;
            text-transform: capitalize;
        }
        .nav-pills a.nav-link:hover {
            background: var(--brand);
            color: #ffffff;
            border-color: var(--brand);
        }
        .cart-badge {
            background: var(--ink);
            color: #ffffff;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 6px;
        }
        .product-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 26px;
            box-shadow: 0 20px 36px rgba(15, 23, 42, 0.12);
        }
        .product-image {
            width: 320px;
            height: 320px;
            object-fit: cover;
            border-radius: 18px;
            background: #f8fafc;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
        }
        .price {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0 14px 0;
        }
        .rupee::before {
            content: "\20B9";
            font-family: "Noto Sans", "Segoe UI", sans-serif;
            margin-right: 4px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
        }
        .meta {
            color: var(--muted);
            font-weight: 600;
        }
    </style>
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <span class="brand">FreshCart</span>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto"></ul>
           <ul class="navbar-nav nav-pills">
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/}" href="#">home</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/shop}" href="#">shop</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/login}" href="#">login</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" sec:authorize="isAuthenticated()" th:href="@{/logout}" href="#">logout</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/cart}" href="#">cart</a>
                </li>
                <li class="nav-item active">
                    <span class="cart-badge" th:text="${cartCount}"></span>
                </li>
            </ul>

        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row align-items-center">
       <div class="col-lg-5 d-flex justify-content-center mb-4 mb-lg-0">
      <img class="product-image"
           th:src="${#strings.startsWith(product.imgName,'http') ? product.imgName : '/productImages/' + product.imgName}"
           onerror="this.src='/images/apple.jpg'"
           alt="">
        </div>
       
        <div class="col-lg-7">
            <div class="product-card">
                <h2 th:text="${product.name}"></h2>
                <p class="meta" th:text="${product.category.name}"></p>
                <div class="price"><span class="rupee"></span><span th:text="${product.price}"></span></div>
                <p class="meta">Weight: <span th:text="${product.weight}"></span> grams</p>
       
                <a href="" th:href="@{/addToCart/{id}(id = ${product.product_id})}" class="btn btn-primary">Add to cart</a>
            </div>
        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
        integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
        integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
</body>
</html>
