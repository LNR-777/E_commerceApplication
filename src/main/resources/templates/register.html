<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <main class="auth">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-badge">FreshCart</div>
                <h1>Create account</h1>
                <p>Join us for fresh groceries, exclusive deals, and quick checkout.</p>
            </div>

            <div class="message success" th:if="${message !=null}">
                [[${message}]]
            </div>

            <form class="auth-form" th:action="@{/registration}" method="post" role="form" th:object="${user}">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Your full name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">

                <button type="submit">Register</button>

                <p class="auth-footer">
                    Already have an account?
                    <a class="linkControl" href="./login.html" th:href="@{/login}">Login here</a>
                </p>
            </form>
        </div>
    </main>
    
</body>
</html>
