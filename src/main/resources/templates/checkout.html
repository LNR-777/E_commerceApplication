<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="/webjars/font-awesome/5.15.4/css/all.min.css">
    <title>Checkout</title>
    <style>
        :root {
            --brand: #16a34a;
            --brand-dark: #0f8a3d;
            --ink: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --line: #e5e7eb;
        }
        body {
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 10%, rgba(22, 163, 74, 0.18), transparent 42%),
                radial-gradient(circle at 86% 12%, rgba(59, 130, 246, 0.14), transparent 38%),
                #f4f6fb;
            color: var(--ink);
        }
        .navbar {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }
        .brand {
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--ink);
            margin-right: 10px;
        }
        .nav-pills a.nav-link {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 16px;
            margin-left: 8px;
            color: var(--ink);
            font-weight: 600;
            text-transform: capitalize;
        }
        .nav-pills a.nav-link:hover {
            background: var(--brand);
            color: #ffffff;
            border-color: var(--brand);
        }
        .cart-badge {
            background: var(--ink);
            color: #ffffff;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 6px;
        }
        .glass-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
            padding: 24px;
        }
        .section-title {
            font-weight: 700;
        }
        .price {
            font-size: 22px;
            font-weight: 700;
        }
        .rupee::before {
            content: "\20B9";
            font-family: "Noto Sans", "Segoe UI", sans-serif;
            margin-right: 4px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid var(--line);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <span class="brand">FreshCart</span>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto"></ul>
            <ul class="navbar-nav nav-pills">
                <li class="nav-item active"><a class="nav-link" th:href="@{/}" href="#">home</a></li>
                <li class="nav-item active"><a class="nav-link" th:href="@{/shop}" href="#">shop</a></li>
                <li class="nav-item active"><a class="nav-link" th:href="@{/cart}" href="#">cart</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <div class="row">
        <div class="col-lg-7 mb-4">
            <div class="glass-card">
                <h4 class="section-title mb-3">Delivery details</h4>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Full name</label>
                        <input type="text" class="form-control" placeholder="Enter full name">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Phone</label>
                        <input type="text" class="form-control" placeholder="Enter phone number">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" placeholder="Street, area, city">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>City</label>
                        <input type="text" class="form-control" placeholder="City">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Pincode</label>
                        <input type="text" class="form-control" placeholder="Pincode">
                    </div>
                </div>
                <div class="form-group">
                    <label>Payment method</label>
                    <select class="form-control">
                        <option>Cash on delivery</option>
                        <option>UPI</option>
                        <option>Card</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="glass-card">
                <h4 class="section-title mb-3">Order summary</h4>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span class="price"><span class="rupee"></span><span th:text="${total}"></span></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Shipping</span>
                    <span>Gratis</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-3">
                    <strong>Total</strong>
                    <strong class="price"><span class="rupee"></span><span th:text="${total}"></span></strong>
                </div>
                <a class="btn btn-primary btn-block" th:href="@{/}">Place order</a>
            </div>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
</body>
</html>
